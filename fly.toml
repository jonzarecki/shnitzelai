app = 'shnitzelai'
primary_region = 'iad'

[build]

[env]
  DATABASE_PATH = '/data/shnitzel.db'
  GENERATED_DIR = '/data/generated'
  NODE_ENV = 'production'
  PORT = '3000'
  DISABLE_ADMIN = 'true'
  LOGS_DIR = '/data/logs'
  TZ = 'Asia/Jerusalem'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '5s'
    method = 'GET'
    path = '/api/health'

[deploy]
  strategy = 'immediate'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
